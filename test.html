<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
    <title>🚩 인천2호선 실내 위치 안내</title>
    <!-- Tailwind & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#091426",
                        "background": "#f7f9fb",
                        "primary-container": "#1e293b", // 다크 네이비 (위치 박스용)
                        "notice-indigo": "#eef2ff",
                        "notice-amber": "#fffbeb",
                    }
                },
            },
        }
    </script>
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #f7f9fb;
            overflow-x: hidden;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .fill-icon { font-variation-settings: 'FILL' 1; }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
        
        /* 지도 카드 그림자 미세 조정 */
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 4px 10px -5px rgba(0, 0, 0, 0.03); }
    </style>
</head>

<body class="min-h-screen text-slate-900">

<!-- 1. 상단 헤더 (디자인 기준: 양 끝 정렬) -->
<header class="fixed top-0 left-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 h-14">
    <div class="flex items-center justify-between w-full max-w-[800px] mx-auto px-5 h-full">
        <img src="https://www.ictr.or.kr/main/img/main2025/logo.svg" alt="인천교통공사" class="h-7 w-auto">
        <div class="flex items-center gap-1.5">
            <span class="material-symbols-outlined text-primary text-[20px] fill-icon" style="font-variation-settings: 'FILL' 1;">location_on</span>
            <h1 id="station-name" class="text-lg font-bold text-primary tracking-tight">인천2호선</h1>
        </div>
    </div>
</header>

<main class="pt-16 pb-32 flex flex-col gap-5 px-5 w-full max-w-[800px] mx-auto">
    
    <!-- 2. 공지사항 영역 (디자인 기준: 둥근 모서리와 깔끔한 아이콘) -->
    <section id="notice-section" class="flex flex-col gap-2.5 mt-2">
        <!-- 전체 공지 -->
        <div id="global-notice-box" class="hidden bg-notice-indigo p-4 rounded-2xl flex items-start gap-4 border border-indigo-100/50 shadow-sm">
            <span class="material-symbols-outlined text-indigo-500 text-[24px]">campaign</span>
            <div class="flex flex-col gap-0.5">
                <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Notice</span>
                <p id="global-notice-text" class="text-[15px] text-indigo-900 leading-tight font-medium"></p>
            </div>
        </div>

        <!-- 지역/장소 공지 -->
        <div id="local-notice-box" class="hidden bg-notice-amber p-4 rounded-2xl flex items-start gap-4 border border-amber-100/50 shadow-sm">
            <span class="material-symbols-outlined text-amber-500 text-[24px]">info</span>
            <div class="flex flex-col gap-0.5 w-full">
                <span class="text-[10px] font-bold text-amber-400 uppercase tracking-widest">Guide</span>
                <p id="station-notice-text" class="text-[15px] text-amber-900 leading-tight font-bold mb-0.5 hidden"></p>
                <p id="additional-text" class="text-[14px] text-amber-800/80 leading-tight hidden"></p>
            </div>
        </div>
    </section>

    <!-- 3. 지도 카드 (디자인 기준: 큰 라운드와 부드러운 그림자) -->
    <div id="map-box" class="bg-white rounded-[2rem] card-shadow overflow-hidden border border-slate-100">
        <div class="relative w-full aspect-[1.15] bg-slate-50 overflow-hidden">
            <img id="place-img" alt="내부 지도" class="w-full h-full object-cover scale-[1.01]" src="">
        </div>
    </div>

    <!-- 4. 현재 위치 박스 (디자인 기준: 다크 네이비 테마) -->
    <div id="place-desc-box" class="bg-primary-container text-white p-7 rounded-[2rem] flex items-start gap-5 shadow-xl">
        <div class="bg-white/10 p-2.5 rounded-2xl">
            <span class="material-symbols-outlined text-[30px] text-white fill-icon" style="font-variation-settings: 'FILL' 1;">location_on</span>
        </div>
        <div class="flex flex-col">
            <span class="text-[14px] text-white/60 font-medium mb-1.5">현재 고객님의 위치는</span>
            <p id="place-desc" class="text-[20px] leading-tight font-bold tracking-tight"></p>
        </div>
    </div>

    <!-- 5. 하단 도움말 팁 -->
    <div class="bg-white/50 p-4 rounded-2xl border border-slate-200/60 text-center">
        <p class="text-[13px] text-slate-400">
            ✨ 도움이 필요하시면 하단의 <strong class="text-slate-500 font-bold">'전화연결'</strong> 버튼을 이용해 주세요.
        </p>
    </div>
</main>

<!-- 6. 하단 내비게이션 바 (디자인 기준: 아이콘 강조 및 선명한 텍스트) -->
<div class="fixed bottom-0 left-0 w-full z-50 bg-white/95 backdrop-blur-lg rounded-t-[2.5rem] shadow-[0_-15px_40px_rgba(0,0,0,0.08)] border-t border-slate-100 px-3 pb-safe">
    <nav class="flex items-center h-24 max-w-[800px] mx-auto">
        
        <!-- 새창 지도 -->
        <div onclick="openMapNewWindow()" class="flex-1 flex flex-col items-center justify-center cursor-pointer group">
            <div class="h-10 w-10 flex items-center justify-center rounded-2xl group-hover:bg-slate-100 transition-all">
                <span class="material-symbols-outlined text-slate-500 !text-[28px]">open_in_new</span>
            </div>
            <span class="text-[11px] font-bold mt-1 text-slate-500 text-center leading-tight tracking-tighter">새창으로<br>지도열기</span>
        </div>

        <!-- 카톡채널 -->
        <a href="https://pf.kakao.com/_xexaiQj" target="_blank" class="flex-1 flex flex-col items-center justify-center no-underline group">
            <div class="h-10 w-10 flex items-center justify-center rounded-2xl group-hover:bg-slate-100 transition-all">
                <img src="images/kakaoico.png" alt="Kakao" class="w-[26px] h-[26px] object-contain">
            </div>
            <span class="text-[11px] font-bold mt-1 text-slate-500 text-center leading-tight tracking-tighter">인천교통공사<br>카카오톡채널</span>
        </a>

        <!-- 유실물 조회 -->
        <a href="https://minwon24.police.go.kr/cvlcpt/cvlcptAply.do?cvlcptId=MW-201&keyword=" target="_blank" class="flex-1 flex flex-col items-center justify-center no-underline group">
            <div class="h-10 w-10 flex items-center justify-center rounded-2xl group-hover:bg-slate-100 transition-all">
                <span class="material-symbols-outlined text-slate-500 !text-[28px]">inventory_2</span>
            </div>
            <span class="text-[11px] font-bold mt-1 text-slate-500 text-center leading-tight tracking-tighter">유실물<br>조회</span>
        </a>

        <!-- 역무실 전화 -->
        <a id="contact-link" href="#" class="flex-1 flex flex-col items-center justify-center no-underline group">
            <div class="h-10 w-10 flex items-center justify-center rounded-2xl group-hover:bg-green-50 transition-all">
                <span class="material-symbols-outlined text-green-600 !text-[32px]" style="font-variation-settings: 'FILL' 1;">phone_in_talk</span>
            </div>
            <span class="text-[11px] font-bold mt-1 text-green-600 text-center leading-tight tracking-tighter">역무실<br>전화연결</span>
        </a>

    </nav>
</div>

<!-- 데이터 로드 -->
<script src="data.js"></script>
<script src="notices.js"></script>

<script>
    let currentPlace = null;
    let imageLoadFailed = false;

    function openMapNewWindow() {
        const img = document.getElementById('place-img');
        if (imageLoadFailed) { alert('지도 이미지를 불러올 수 없습니다.'); return; }
        if (img && img.src && img.src !== window.location.href) window.open(img.src, '_blank');
        else alert('지도를 불러오는 중입니다.');
    }

    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const placeId = urlParams.get('id');

        const stationNameEl = document.getElementById('station-name');
        const descEl = document.getElementById('place-desc');
        const imgEl = document.getElementById('place-img');
        const linkEl = document.getElementById('contact-link');
        const globalBox = document.getElementById('global-notice-box');
        const globalText = document.getElementById('global-notice-text');
        const localBox = document.getElementById('local-notice-box');
        const stationNoticeText = document.getElementById('station-notice-text');
        const additionalText = document.getElementById('additional-text');
        const mapBox = document.getElementById('map-box');
        const placeDescBox = document.getElementById('place-desc-box');

        if (typeof noticeData !== 'undefined' && noticeData.global && noticeData.global.trim() !== "") {
            globalText.innerText = noticeData.global;
            globalBox.classList.remove('hidden');
        }

        if (!placeId || !placeData[placeId]) {
            document.getElementById('notice-section').classList.add('hidden');
            mapBox.classList.add('hidden');
            placeDescBox.classList.add('hidden');
            document.getElementById('invalid-notice-box') ? document.getElementById('invalid-notice-box').classList.remove('hidden') : alert('잘못된 접근입니다.');
            return;
        }

        currentPlace = placeData[placeId];
        if (currentPlace.station) stationNameEl.innerText = currentPlace.station;
        descEl.innerText = `${currentPlace.title} 입니다.`;

        imgEl.onerror = () => { imageLoadFailed = true; mapBox.classList.add('hidden'); };
        imgEl.src = "images/" + currentPlace.image_name;

        linkEl.href = "tel:" + currentPlace.phone;

        // 알림 기능 활성화 (전화 연결 클릭 시 디스코드 알림 전송)
        linkEl.addEventListener('click', () => {
            sendDiscordNotification(" **[📞 전화 연결]** 방문자가 '역무실 전화연결' 버튼을 클릭했습니다.");
        });

        if (typeof noticeData !== 'undefined') {
            if (noticeData.stations && noticeData.stations[currentPlace.station]) {
                stationNoticeText.innerText = noticeData.stations[currentPlace.station];
                stationNoticeText.classList.remove('hidden');
            }
            if (noticeData.places && noticeData.places[placeId]) {
                additionalText.innerText = noticeData.places[placeId];
                additionalText.classList.remove('hidden');
            }
            if (noticeData.stations[currentPlace.station] || noticeData.places[placeId]) localBox.classList.remove('hidden');
        }
    });

    function sendDiscordNotification(statusMessage) {
        if (!currentPlace) return Promise.resolve();
        const now = new Date();
        const visitorTime = now.toLocaleString();
        return fetch('/send-webhook', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: currentPlace.title, statusMessage: statusMessage, time: visitorTime })
        });
    }
</script>

</body>
</html>
