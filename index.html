<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
    <title>인천2호선 실내 위치 안내</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
            theme: { extend: { "colors": { "primary": "#091426", "primary-container": "#1e293b" } } }
        }
    </script>
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Noto Sans KR', sans-serif; 
            overflow-x: hidden;
            background-color: #f2f5f8;
            margin: 0;
            background-size: 200% 200%;
            background-image: 
                radial-gradient(at 0% 0%, rgba(110, 179, 41, 0.35) 0%, transparent 50%),   
                radial-gradient(at 100% 0%, rgba(233, 72, 23, 0.3) 0%, transparent 50%),  
                radial-gradient(at 50% 100%, rgba(0, 144, 212, 0.35) 0%, transparent 50%); 
            background-attachment: fixed;
            animation: moveGradient 18s ease infinite alternate;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 100%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .location-gradient-glass {
            background: linear-gradient(135deg, rgba(41, 128, 185, 0.3), rgba(39, 174, 96, 0.3));
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .single-line-fit {
            white-space: nowrap;
            overflow: hidden;
            display: block;
            width: 100%;
        }

        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .fill-icon { font-variation-settings: 'FILL' 1; }

        header.safe-header {
            padding-top: env(safe-area-inset-top, 0px);
        }
        main.safe-main {
            padding-top: 3.5rem;
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
        
        /* Chrome, Safari, Opera, Edge에서 스크롤바 숨기기 */
        html::-webkit-scrollbar, 
        body::-webkit-scrollbar {
            display: none;
        }

        /* IE 및 Firefox에서 스크롤바 숨기기 */
        html, body {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>

            <div class="flex items-center gap-3 w-full overflow-hidden">
                <!-- 미니멀한 rounded-xl과 w-9 h-9의 세련된 컴팩트 아이콘 보정 -->
                <div class="flex-shrink-0 bg-white/20 w-9 h-9 rounded-xl flex items-center justify-center shadow-inner">
                    <span class="material-symbols-outlined text-[18px] text-white fill-icon" style="font-variation-settings: 'FILL' 1;">location_on</span>

                </div>
            </div>

    </section>

</main>

<!-- 디스코드 긴급도움 모바일 플로팅 단추 (CONFIG 제어 스위치에 따라 자동 노출 및 배치 작동) -->
<button id="help-trigger-btn" class="hidden fixed bottom-28 right-6 z-40 w-14 h-14 rounded-full bg-white border border-slate-200/80 shadow-[0_8px_30px_rgba(0,0,0,0.12)] flex items-center justify-center cursor-pointer transition-all active:scale-95 duration-200 focus:outline-none">
    <span class="text-[28px] leading-none select-none">🚨</span>
</button>

<script src="data.js"></script>
<script src="notices.js"></script>
<script>
    const CONFIG = {
        PATH_IMAGE: 'images/',
        CLASS_HIDDEN: 'hidden',
        CLASS_DISABLE: ['opacity-40', 'pointer-events-none'],
        // [토글 제어 장치] 디스코드 헬프 버튼을 활성화하려면 true, 완전 숨기려면 false로 변경하시면 됩니다.
        ENABLE_DISCORD_HELP: false 
    };

    const SELECTORS = {
        header: 'header.safe-header',
        main: 'main.safe-main',
        logoImg: 'header img',
        stationName: '#station-name',
        placeDesc: '#place-desc',
        placeImg: '#place-img',
        contactLink: '#contact-link',
        globalNoticeBox: '#global-notice-box',
        globalNoticeText: '#global-notice-text',
        localNoticeBox: '#local-notice-box',
        stationNoticeText: '#station-notice-text',
        additionalText: '#additional-text',
        mapBox: '#map-box',
        mapPlaceholder: '#map-placeholder',
        mapAspectBox: '#map-aspect-box',
        placeDescBox: '#place-desc-box',
        btnOpenMap: '#btn-open-map',
        errorNoticeBox: '#error-notice-box',
        helpTriggerBtn: '#help-trigger-btn' // 플로팅 버튼 선택자 추가
    };

    const AppState = {
        currentPlace: null,
        placeId: null,
        imageLoadFailed: false
    };

    const UI = {
        autoFitTexts: []
    };

    const DOM = {
        show: (el) => el?.classList.remove(CONFIG.CLASS_HIDDEN),
        hide: (el) => el?.classList.add(CONFIG.CLASS_HIDDEN),
        setText: (el, text) => { if (el) el.innerText = text; },
        enableLink: (el, url) => {
            if (!el) return;
            el.href = url;
            el.classList.remove(...CONFIG.CLASS_DISABLE);
        },
        disableLink: (el) => {
            if (!el) return;
            el.removeAttribute('href');
            el.classList.add(...CONFIG.CLASS_DISABLE);
        }
    };

    function syncHeaderHeight() {
        if (UI.header && UI.main) {
            UI.main.style.paddingTop = `${UI.header.offsetHeight}px`;
        }
    }

    function fitText() {
        if (!UI.autoFitTexts || UI.autoFitTexts.length === 0) return;

        UI.autoFitTexts.forEach(el => {
            let originalSize = el.dataset.originalSize;
            if (!originalSize) {
                originalSize = parseInt(window.getComputedStyle(el).fontSize) || 16;
                el.dataset.originalSize = originalSize;
            } else {
                originalSize = parseInt(originalSize);
            }

            let lo = 8, hi = originalSize, best = lo;
            el.style.fontSize = `${hi}px`;
            if (el.scrollWidth <= el.clientWidth) return;

            while (lo <= hi) {
                const mid = Math.floor((lo + hi) / 2);
                el.style.fontSize = `${mid}px`;
                if (el.scrollWidth <= el.clientWidth) {
                    best = mid;
                    lo = mid + 1;
                } else {
                    hi = mid - 1;
                }
            }
            el.style.fontSize = `${best}px`;
        });
    }

    let layoutRafId = null;
    function scheduleLayout() {
        if (layoutRafId) cancelAnimationFrame(layoutRafId);
        layoutRafId = requestAnimationFrame(() => {
            syncHeaderHeight();
            fitText();
        });
    }

    function handleImageError() {
        AppState.imageLoadFailed = true;
        DOM.hide(UI.placeImg);
        DOM.show(UI.mapPlaceholder);
        if (UI.mapAspectBox) UI.mapAspectBox.style.aspectRatio = '';
    }

    function openMapNewWindow() {
        if (AppState.imageLoadFailed) { 
            alert('지도 이미지를 불러올 수 없습니다.'); 
            return; 
        }
        if (UI.placeImg && UI.placeImg.src && UI.placeImg.src !== window.location.href) {
            window.open(UI.placeImg.src, '_blank', 'noopener,noreferrer');
        } else {
            alert('지도를 불러오는 중입니다.');
        }
    }

    function adjustMapAspectRatio() {
        const img = UI.placeImg;
        const box = UI.mapAspectBox;
        if (!img || !box || !img.naturalWidth || !img.naturalHeight) return;
        box.style.aspectRatio = `${img.naturalWidth} / ${img.naturalHeight}`;
    }

    // 디스코드 전송 시간 계산 함수 (기기 타임존 오류 차단용 수동 포맷 조립)
    function getFormattedKoreanTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        
        const ampm = hours >= 12 ? '오후' : '오전';
        hours = hours % 12;
        hours = hours ? hours : 12;

        return `${year}. ${month}. ${date}. ${ampm} ${hours}:${minutes}:${seconds}`;
    }

    // 디스코드 알림 전송 API 통신 모듈
    function sendDiscordNotification(statusMessage) {
        const place = AppState.currentPlace;
        if (!place) {
            console.log("장소 데이터가 존재하지 않아 알림 전송을 보류합니다.");
            return Promise.resolve();
        }

        const requestBody = {
            title: place.title,
            statusMessage: statusMessage,
            time: getFormattedKoreanTime()
        };

        return fetch('/send-webhook', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        }).then(res => {
            if (!res.ok) throw new Error("알림 전송 실패");
            return res.json();
        });
    }

    // 플로팅 단추 클릭 피드백 제어 모듈
    function handleHelpButtonClick() {
        if (!AppState.currentPlace || AppState.imageLoadFailed) return;

        const btn = UI.helpTriggerBtn;
        if (!btn) return;

        // 중복 전송 방지 비활성화 및 로딩상태 전환
        btn.disabled = true;
        btn.classList.add('opacity-60', 'pointer-events-none');
        btn.querySelector('span').innerText = '⏳';

        sendDiscordNotification(" **[🚨 긴급 호출 🚨]** 방문자가 **'도움이 필요합니다'** 버튼을 클릭했습니다! 현장 확인 바랍니다.")
            .then(() => {
                alert("⚠️ 현장 담당자에게 도움 요청 알림이 전송되었습니다. 잠시만 기다려주세요!");
                btn.querySelector('span').innerText = '✅';
                btn.classList.remove('border-slate-200/80');
                btn.classList.add('border-emerald-500', 'bg-emerald-50');
                
                // 3초 후 원상복구 리셋
                setTimeout(resetHelpButton, 3000);
            })
            .catch(() => {
                alert("전송에 실패했습니다. 담당자에게 유선으로 연락 바랍니다.");
                btn.querySelector('span').innerText = '❌';
                btn.classList.remove('border-slate-200/80');
                btn.classList.add('border-rose-500', 'bg-rose-50');
                
                // 3초 후 원상복구 리셋
                setTimeout(resetHelpButton, 3000);
            });
    }

    // 호출 처리 완료 후 버튼 원상 복구 함수
    function resetHelpButton() {
        const btn = UI.helpTriggerBtn;
        if (!btn) return;

        btn.disabled = false;
        btn.classList.remove('opacity-60', 'pointer-events-none', 'border-emerald-500', 'bg-emerald-50', 'border-rose-500', 'bg-rose-50');
        btn.classList.add('border-slate-200/80', 'bg-white');
        btn.querySelector('span').innerText = '🚨';
    }
    
    function cacheElements() {
        Object.keys(SELECTORS).forEach(key => {
            const sel = SELECTORS[key];
            UI[key] = sel.startsWith('#') 
                ? document.getElementById(sel.slice(1)) 
                : document.querySelector(sel);
        });
        UI.autoFitTexts = document.querySelectorAll('.auto-fit-text');
    }

    function bindEvents() {
        window.addEventListener('resize', scheduleLayout);
        window.addEventListener('load', scheduleLayout);

        if (UI.logoImg) UI.logoImg.addEventListener('load', scheduleLayout);
        if (UI.placeImg) {
            UI.placeImg.addEventListener('load', () => {
                AppState.imageLoadFailed = false;
                DOM.show(UI.placeImg);
                DOM.hide(UI.mapPlaceholder);
                adjustMapAspectRatio();
                scheduleLayout();
            });
            UI.placeImg.onerror = handleImageError;
        }
        if (UI.btnOpenMap) UI.btnOpenMap.addEventListener('click', openMapNewWindow);

        // 긴급도움 플로팅 버튼 클릭 리스너 결합
        if (UI.helpTriggerBtn) {
            UI.helpTriggerBtn.addEventListener('click', handleHelpButtonClick);
        }
    }

    function loadPlaceData() {
        const urlParams = new URLSearchParams(window.location.search);
        AppState.placeId = urlParams.get('id');

        if (typeof placeData === 'undefined') {
            console.error('placeData is undefined.');
            return;
        }

        const hasPlace = AppState.placeId && Object.prototype.hasOwnProperty.call(placeData, AppState.placeId);
        if (hasPlace) {
            AppState.currentPlace = placeData[AppState.placeId];
        }
    }

    function render() {
        // 비정상 위치 정보 혹은 데이터 로드 실패 시 예외 뷰 전환
        if (!AppState.currentPlace) {
            DOM.hide(UI.placeDescBox);
            DOM.hide(UI.mapBox);
            DOM.hide(UI.helpTriggerBtn); // 오류 시 플로팅 숨김
            DOM.show(UI.errorNoticeBox);
            return;
        }

        DOM.hide(UI.errorNoticeBox);
        renderPlace();
        renderMap();
        renderNotice();
        renderPhone();

        // 긴급 도움 스위치 제어 설정에 따라 플로팅 토글 작동
        if (CONFIG.ENABLE_DISCORD_HELP) {
            DOM.show(UI.helpTriggerBtn);
        } else {
            DOM.hide(UI.helpTriggerBtn);
        }
    }

    function renderPlace() {
        const place = AppState.currentPlace;
        if (place.station) {
            DOM.setText(UI.stationName, place.station);
        }
        DOM.setText(UI.placeDesc, place.title || '');
    }

    function renderMap() {
        const place = AppState.currentPlace;
        if (UI.placeImg) {
            UI.placeImg.src = CONFIG.PATH_IMAGE + place.image_name;
        }
    }

    // notices.js의 places 데이터 매칭 시 index.html 본문 하단에 역별 공지와 별개로 노출할 수 있도록 renderNotice()를 안전하게 구성
    function renderNotice() {
        if (typeof noticeData === 'undefined') return;
        renderGlobalNotice();
        renderLocalNotice();
    }

    function renderGlobalNotice() {
        if (noticeData.global && noticeData.global.trim() !== "") {
            DOM.setText(UI.globalNoticeText, noticeData.global);
            DOM.show(UI.globalNoticeBox);
        }
    }

    function renderLocalNotice() {
        if (!AppState.currentPlace || !AppState.placeId) return;

        const stationNotice = noticeData.stations?.[AppState.currentPlace.station];
        const placeNotice = noticeData.places?.[AppState.placeId];
        let hasLocalNotice = false;

        if (stationNotice) {
            DOM.setText(UI.stationNoticeText, stationNotice);
            DOM.show(UI.stationNoticeText);
            hasLocalNotice = true;
        }
        if (placeNotice) {
            DOM.setText(UI.additionalText, placeNotice);
            DOM.show(UI.additionalText);
            hasLocalNotice = true;
        }
        if (hasLocalNotice) {
            DOM.show(UI.localNoticeBox);
        }
    }

    function renderPhone() {
        const place = AppState.currentPlace;
        if (place.phone) {
            DOM.enableLink(UI.contactLink, `tel:${place.phone}`);
        } else {
            DOM.disableLink(UI.contactLink);
        }
    }

    function init() {
        cacheElements();
        bindEvents();
        loadPlaceData();
        render();
        
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(scheduleLayout);
        } else {
            setTimeout(scheduleLayout, 50);
        }
    }

    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
