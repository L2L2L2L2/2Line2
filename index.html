<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
    <title>📍 인천2호선 위치 안내 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#091426",
                        "on-primary-container": "#8590a6",
                        "background": "#f7f9fb",
                        "primary-container": "#1e293b",
                        "on-surface": "#191c1e",
                        "on-tertiary-container": "#ff5250",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c5c6cd",
                    }
                },
            },
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: 'Hanken Grotesk', sans-serif; background-color: #f7f9fb; overflow-x: hidden; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
    </style>
</head>

<body class="min-h-screen text-on-surface">

<!-- 1. 상단 헤더 (가로폭 제한 및 양쪽 정렬) -->
<header class="fixed top-0 left-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm border-b border-slate-100">
    <div class="max-w-lg mx-auto h-14 flex items-center justify-between px-4">
        <div class="flex items-center gap-1">
            <!-- 로고 이미지가 있다면 images/logo.png 로 교체 가능 -->
            <img src="images/logo.png" alt="인천교통공사" class="h-5 object-contain">
        </div>
        <div class="flex items-center gap-1">
            <span class="material-symbols-outlined text-primary text-[20px] fill-icon" style="font-variation-settings: 'FILL' 1;">location_on</span>
            <h1 id="station-name" class="text-xl font-bold text-primary">인천2호선</h1>
        </div>
    </div>
</header>

<main class="pt-16 pb-32 flex flex-col gap-4 px-4 w-full max-w-lg mx-auto">
    
    <!-- 2. 공지사항 -->
    <section id="notice-section" class="flex flex-col gap-2 mt-2">
        <div id="global-notice-box" class="hidden bg-indigo-50 p-4 rounded-2xl flex items-start gap-3 border border-indigo-100 shadow-sm">
            <span class="material-symbols-outlined text-indigo-600 text-[22px] mt-0.5">campaign</span>
            <div class="flex flex-col">
                <span class="text-[11px] font-bold text-indigo-400 uppercase tracking-tight">Notice</span>
                <p id="global-notice-text" class="text-[15px] text-indigo-900 leading-tight font-medium"></p>
            </div>
        </div>

        <div id="local-notice-box" class="hidden bg-amber-50 p-4 rounded-2xl flex items-start gap-3 border border-amber-100 shadow-sm">
            <span class="material-symbols-outlined text-amber-600 text-[22px] mt-0.5">info</span>
            <div class="flex flex-col w-full">
                <span class="text-[11px] font-bold text-amber-500 uppercase tracking-tight">안내사항</span>
                <p id="station-notice-text" class="text-[15px] text-amber-900 leading-tight font-bold mb-1 hidden"></p>
                <p id="additional-text" class="text-sm text-amber-800 leading-tight opacity-90 hidden"></p>
            </div>
        </div>
    </section>

    <!-- 3. 지도 이미지 -->
    <div id="map-box" class="bg-surface-container-lowest rounded-3xl shadow-[0_4px_24px_rgba(30,41,59,0.08)] overflow-hidden border border-outline-variant/30">
        <div class="relative w-full aspect-[1.20] bg-slate-200 overflow-hidden">
            <img id="place-img" alt="위치 지도" class="w-full h-full object-cover" src="">
        </div>
    </div>

    <!-- 4. 현재 위치 정보 -->
    <div id="place-desc-box" class="bg-primary-container text-white p-6 rounded-3xl flex items-start gap-4 shadow-lg">
        <span class="material-symbols-outlined text-[28px] mt-0.5">location_on</span>
        <div class="flex flex-col">
            <span class="text-sm opacity-80 mb-1">현재 고객님의 위치는</span>
            <p id="place-desc" class="text-[19px] leading-tight font-bold text-white"></p>
        </div>
    </div>

    <!-- 5. 하단 도움말 -->
    <div class="bg-white p-4 rounded-2xl border border-slate-100 text-center shadow-sm">
        <p class="text-sm text-slate-400">
            💡 도움이 필요하시면 하단의 버튼을 이용해 주세요.
        </p>
    </div>
</main>

<!-- 6. 하단 버튼 바 (아이콘 및 텍스트 크기 확대) -->
<div class="fixed bottom-0 left-0 w-full z-50 bg-white rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.06)] border-t border-slate-100 px-2 pb-safe">
    <nav class="flex items-center h-24 max-w-lg mx-auto">
        
        <!-- 새창 지도 -->
        <div onclick="openMapNewWindow()" class="flex-1 flex flex-col items-center justify-center cursor-pointer text-slate-500 hover:bg-slate-50 transition-all">
            <div class="h-8 flex items-center justify-center">
                <span class="material-symbols-outlined !text-[28px]">open_in_new</span>
            </div>
            <span class="text-[11.5px] font-bold mt-1.5 text-center leading-[1.2] whitespace-nowrap tracking-tighter">새창으로<br>지도열기</span>
        </div>

        <!-- 카톡채널 -->
        <a href="https://pf.kakao.com/_xexaiQj" target="_blank" class="flex-1 flex flex-col items-center justify-center cursor-pointer text-slate-500 hover:bg-slate-50 transition-all no-underline">
            <div class="h-8 flex items-center justify-center">
                <img src="images/kakaoico.png" alt="Kakao" class="w-[26px] h-[26px] object-contain">
            </div>
            <span class="text-[11.5px] font-bold mt-1.5 text-center leading-[1.2] whitespace-nowrap tracking-tighter">인천교통공사<br>카카오톡채널</span>
        </a>

        <!-- 유실물 조회 (캡처 화면의 아이콘 추가) -->
        <a href="https://www.lost112.go.kr/" target="_blank" class="flex-1 flex flex-col items-center justify-center cursor-pointer text-slate-500 hover:bg-slate-50 transition-all no-underline">
            <div class="h-8 flex items-center justify-center">
                <span class="material-symbols-outlined !text-[28px]">inventory_2</span>
            </div>
            <span class="text-[11.5px] font-bold mt-1.5 text-center leading-[1.2] whitespace-nowrap tracking-tighter">유실물<br>조회</span>
        </a>

        <!-- 역무실 전화 -->
        <a id="contact-link" href="#" class="flex-1 flex flex-col items-center justify-center cursor-pointer text-green-600 hover:bg-green-50 transition-all no-underline">
            <div class="h-8 flex items-center justify-center">
                <span class="material-symbols-outlined !text-[30px]" style="font-variation-settings: 'FILL' 1;">phone_in_talk</span>
            </div>
            <span class="text-[11.5px] font-bold mt-1.5 text-center leading-[1.2] whitespace-nowrap tracking-tighter text-green-600">역무실<br>전화연결</span>
        </a>

    </nav>
</div>

<script src="data.js"></script>
<script>
    let currentPlace = null;

    function openMapNewWindow() {
        const img = document.getElementById('place-img');
        if (img && img.src && img.src !== window.location.href) window.open(img.src, '_blank');
        else alert('지도를 불러오는 중입니다.');
    }

    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const placeId = urlParams.get('id');

        const stationNameEl = document.getElementById('station-name');
        const descEl = document.getElementById('place-desc');
        const imgEl = document.getElementById('place-img');
        const linkEl = document.getElementById('contact-link');
        const globalBox = document.getElementById('global-notice-box');
        const globalText = document.getElementById('global-notice-text');
        const localBox = document.getElementById('local-notice-box');
        const stationNoticeText = document.getElementById('station-notice-text');
        const additionalText = document.getElementById('additional-text');
        const mapBox = document.getElementById('map-box');
        const placeDescBox = document.getElementById('place-desc-box');

        if (typeof globalConfig !== 'undefined' && globalConfig.global_notice) {
            globalText.innerText = globalConfig.global_notice;
            globalBox.classList.remove('hidden');
        }

        if (!placeId || !placeData[placeId]) {
            descEl.innerHTML = "잘못된 접근입니다.<br>QR코드를 다시 확인해주세요.";
            mapBox.classList.add('hidden');
            return;
        }

        currentPlace = placeData[placeId];
        if (currentPlace.station) stationNameEl.innerText = currentPlace.station;
        descEl.innerText = `${currentPlace.title} 입니다.`;

        imgEl.onerror = () => {
            imgEl.onerror = null;
            imgEl.src = "images/fallback.jpg";
        };
        imgEl.src = "images/" + currentPlace.image_name;
        linkEl.href = "tel:" + currentPlace.phone;

        let hasLocalInfo = false;
        const stationName = currentPlace.station;
        if (typeof globalConfig !== 'undefined' && globalConfig.station_notices && globalConfig.station_notices[stationName]) {
            stationNoticeText.innerText = globalConfig.station_notices[stationName];
            stationNoticeText.classList.remove('hidden');
            hasLocalInfo = true;
        }

        if (currentPlace.additional_data && currentPlace.additional_data.trim() !== "") {
            additionalText.innerText = currentPlace.additional_data; 
            additionalText.classList.remove('hidden');
            hasLocalInfo = true;
        }

        if (hasLocalInfo) localBox.classList.remove('hidden');
    });
</script>

</body>
</html>
